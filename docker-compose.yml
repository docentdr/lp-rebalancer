version: "3.8"

services:
  lp-rebalancer:
    build: .
    container_name: lp-rebalancer
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - lp-network

  snapshot-cron:
    build:
      context: .
      dockerfile: Dockerfile.snapshot
    container_name: lp-rebalancer-snapshot-cron
    restart: unless-stopped
    environment:
      SNAPSHOT_CRON_SCHEDULE: "5 0 * * *"
    volumes:
      - ./data/snapshots:/app/data/snapshots
    networks:
      - lp-network

networks:
  lp-network:
    driver: bridge
